services:
  app:
    build: .
    container_name: agentic_rag_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - WORKING_DIR=/app
    volumes:
      - ./sqlite_data:/app/sqlite_data
    depends_on:
      - qdrant
      - redis

  tests:
    build: .
    container_name: agentic_rag_tests
    command: >
      sh -c "pytest -q app/tests"
    env_file:
      - .env
    environment:
      - WORKING_DIR=/app
    volumes:
      - ./sqlite_data:/app/sqlite_data
    depends_on:
      - qdrant
      - redis

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"