services:
  app:
    build: .
    container_name: agentic_rag_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Use a stable container path, but persist to the host WORKING_DIR.
      - WORKING_DIR=/workdir
      - GUNICORN_WORKERS=4
    command: >
      sh -c "gunicorn app.main:app --preload -w $${GUNICORN_WORKERS:-4} -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"
    volumes:
      # Persist *everything* (uploads, logs, sqlite_data, etc.) under your host WORKING_DIR.
      - ${WORKING_DIR:-./temp}:/workdir
    depends_on:
      - qdrant
      - redis

  tests:
    build: .
    container_name: agentic_rag_tests
    command: >
      sh -c "pytest -q app/tests"
    env_file:
      - .env
    environment:
      - WORKING_DIR=/workdir
    volumes:
      - ${WORKING_DIR:-./temp}:/workdir
    depends_on:
      - qdrant
      - redis

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Keep qdrant storage under the same host WORKING_DIR.
      - ${WORKING_DIR:-./temp}/qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"