# Install once per clone: pre-commit install && pre-commit install --hook-type commit-msg
# Run manually on all files: pre-commit run --all-files
# https://pre-commit.com
#
# Conventional Commits enforcement (commit-msg stage) uses commitizen.
# Format: <type>(<scope>): <subject>
# Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert

repos:
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.29.1
    hooks:
      - id: commitizen
        stages: [commit-msg]
  - repo: https://github.com/psf/black
    rev: "24.10.0"
    hooks:
      - id: black
        language_version: python3.11
        files: ^app/

  - repo: https://github.com/pycqa/isort
    rev: "5.13.2"
    hooks:
      - id: isort
        files: ^app/

  - repo: local
    hooks:
      # language: python + additional_dependencies: hooks run in pre-commit's own venvs so
      # bare ruff/mypy/pytest resolve without a local .venv (e.g. Docker-only workflows).
      - id: ruff-working-dir-cache
        name: ruff (WORKING_DIR cache)
        language: python
        additional_dependencies: [ruff==0.8.4]
        pass_filenames: false
        entry: >
          bash -c '
          if [ -f .env ]; then set -a; source .env; set +a; fi;
          CACHE_ROOT="${WORKING_DIR:-./temp}/cache";
          ruff check --fix --cache-dir "${CACHE_ROOT}/ruff" app/
          '
        files: ^app/

      - id: pre-push-mypy-pytest
        name: pre-push (mypy + pytest)
        language: python
        additional_dependencies: ["setuptools>=68", wheel]
        pass_filenames: false
        entry: >
          bash -c '
          if [ -f .env ]; then set -a; source .env; set +a; fi;
          python -m pip install -q -e ".[dev]";
          CACHE_ROOT="${WORKING_DIR:-./temp}/cache";
          mypy --cache-dir "${CACHE_ROOT}/mypy" app/ --ignore-missing-imports;
          pytest -o cache_dir="${CACHE_ROOT}/pytest" -q app/tests
          '
        files: ^app/
        stages: [pre-push]
